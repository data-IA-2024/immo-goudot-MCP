name: Docker Build and Push to GHCR

on:
  push:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  # Use lowercase directly
  IMAGE_NAME_LOWER: ${{ github.repository_owner }}/${{ github.event.repository.name }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure submodule authentication
        run: |
          git config --global url."https://mv-144:${{ secrets.MV144_PAT }}@github.com/mv-144/".insteadOf "https://github.com/mv-144/"

      - name: Update submodules
        run: |
          git submodule sync
          git submodule update --init --recursive

      - name: Create version.json
        run: |
          COMMIT_HASH=$(git rev-parse --short HEAD)
          COMMIT_DATE=$(git show -s --format=%ci HEAD)
          COMMIT_MESSAGE=$(git log -1 --pretty=%B | head -n 1)
          COMMIT_AUTHOR=$(git log -1 --pretty=%an)
          mkdir -p public
          cat > public/version.json <<EOF
          {
              "commitHash": "$COMMIT_HASH",
              "commitDate": "$COMMIT_DATE",
              "branch": "goudot",
              "message": "$COMMIT_MESSAGE",
              "author": "$COMMIT_AUTHOR"
          }
          EOF
          cat public/version.json

      - name: Convert repository name to lowercase
        id: lowercase
        run: |
          echo "repo=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Set up QEMU for multi-arch builds
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ steps.lowercase.outputs.repo }}:latest
            ${{ env.REGISTRY }}/${{ steps.lowercase.outputs.repo }}:main
            ${{ env.REGISTRY }}/${{ steps.lowercase.outputs.repo }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max