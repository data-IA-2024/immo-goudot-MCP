name: Docker Build and Push to GHCR

on:
  push:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure submodule authentication
        run: |
          git config --global url."https://mv-144:${{ secrets.MV144_PAT }}@github.com/mv-144/".insteadOf "https://github.com/mv-144/"

      - name: Update submodules
        run: |
          git submodule sync
          git submodule update --init --recursive

      - name: Create version.json
        run: |
          # Récupérer les informations du commit
          COMMIT_HASH=$(git rev-parse --short HEAD)
          COMMIT_DATE=$(git show -s --format=%ci HEAD)
          COMMIT_MESSAGE=$(git log -1 --pretty=%B | head -n 1)
          COMMIT_AUTHOR=$(git log -1 --pretty=%an)

          # Créer le fichier version.json
          mkdir -p public
          cat > public/version.json <<EOF
          {
              "commitHash": "$COMMIT_HASH",
              "commitDate": "$COMMIT_DATE",
              "branch": "goudot",
              "message": "$COMMIT_MESSAGE",
              "author": "$COMMIT_AUTHOR"
          }
          EOF

      - name: Afficher le contenu du fichier version.json
        run: cat public/version.json

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
