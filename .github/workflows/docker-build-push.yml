name: Docker Build and Push to GHCR

on:
  push:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
        include:
          - platform: linux/amd64
            tag-suffix: amd64
          - platform: linux/arm64
            tag-suffix: arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure submodule authentication
        run: |
          git config --global url."https://mv-144:${{ secrets.MV144_PAT }}@github.com/mv-144/".insteadOf "https://github.com/mv-144/"

      - name: Update submodules
        run: |
          git submodule sync
          git submodule update --init --recursive

      - name: Create version.json
        run: |
          # Récupérer les informations du commit
          COMMIT_HASH=$(git rev-parse --short HEAD)
          COMMIT_DATE=$(git show -s --format=%ci HEAD)
          COMMIT_MESSAGE=$(git log -1 --pretty=%B | head -n 1)
          COMMIT_AUTHOR=$(git log -1 --pretty=%an)

          # Créer le fichier version.json
          mkdir -p public
          cat > public/version.json <<EOF
          {
              "commitHash": "$COMMIT_HASH",
              "commitDate": "$COMMIT_DATE",
              "branch": "goudot",
              "message": "$COMMIT_MESSAGE",
              "author": "$COMMIT_AUTHOR"
          }
          EOF

      - name: Display version.json content
        run: cat public/version.json

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        if: matrix.platform != 'linux/amd64'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          platforms: ${{ matrix.platform }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.tag-suffix }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}-${{ matrix.tag-suffix }}
          labels: |
            org.opencontainers.image.title=${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.platform=${{ matrix.platform }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Optional: Create multi-arch manifest
  create-manifest:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          # Create manifest for main tag
          docker manifest create ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main \
            --amend ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:amd64 \
            --amend ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:arm64
          
          docker manifest push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main
          
          # Create manifest for latest tag
          docker manifest create ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            --amend ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:amd64 \
            --amend ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:arm64
          
          docker manifest push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          
          # Create manifest for commit SHA tag
          docker manifest create ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --amend ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}-amd64 \
            --amend ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}-arm64
          
          docker manifest push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}